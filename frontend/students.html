<div class="container py-4">
    <div class="page-title">Gestion des étudiants</div>
    <div class="row g-4">
        <div class="col-lg-4"><div class="form-card"><h4>Ajouter un étudiant</h4><form id="studentForm">
            <div class="mb-3"><label class="form-label">Nom complet</label><input type="text" class="form-control" id="full_name" required></div>
            <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="email" required></div>
            <div class="mb-3"><label class="form-label">Département</label><input type="text" class="form-control" id="department"></div>
            <div class="mb-3"><label class="form-label">Niveau</label><input type="text" class="form-control" id="level"></div>
            <div class="mb-3"><label class="form-label">Mot de passe hashé</label><input type="text" class="form-control" id="password_hash" value="hashed_default_password"></div>
            <button type="submit" class="btn btn-primary">Ajouter</button>
        </form></div></div>
        <div class="col-lg-8"><div class="table-container"><div class="d-flex justify-content-between align-items-center mb-3"><h4>Liste des étudiants</h4><button class="btn btn-outline-primary" onclick="loadStudents()">Actualiser</button></div><div id="studentsTableContainer" class="loading-text">Chargement...</div></div></div>
    </div>
</div>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommandations - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home_icons.css">
    <link rel="stylesheet" href="css/navbar_dynamic.css">
</head>
<body>
    <div id="dynamicNavbarHost"></div>

    <div class="container py-4">
        <div class="page-title">Système de recommandation intelligent</div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="form-card">
                    <h4>Recommandations populaires</h4>
                    <button class="btn btn-primary" onclick="loadPopularRecommendations()">Afficher</button>
                </div>

                <div class="form-card mt-4">
                    <h4>Recommandations par utilisateur</h4>
                    <label class="form-label">User ID Goodbooks</label>
                    <input type="number" id="userId" class="form-control mb-3" value="12874">
                    <button class="btn btn-outline-primary" onclick="loadUserRecommendations()">Recommander</button>
                </div>

                <div class="form-card mt-4">
                    <h4>Livres similaires</h4>
                    <label class="form-label">Book ID</label>
                    <input type="number" id="bookId" class="form-control mb-3" value="2">
                    <button class="btn btn-outline-secondary" onclick="loadSimilarBooks()">Trouver similaires</button>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="table-container">
                    <h4>Résultats</h4>
                    <div id="recommendationsMeta" class="small-muted mb-3"></div>
                    <div id="recommendationsContainer" class="loading-text">Choisissez une action.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/recommendations.js"></script>
    <script src="js/auth.js"></script>
<script src="js/protect_app_user.js"></script>    <script src="js/nav_role.js"></script>
</body>
</html>

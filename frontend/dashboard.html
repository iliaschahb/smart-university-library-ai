<!DOCTYPE html>
    <html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard relationnel - Smart Library AI</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/home_icons.css">
    <link rel="stylesheet" href="css/navbar_dynamic.css">
    <link rel="stylesheet" href="css/ui_final.css">
</head>
    <body>
        <div id="dynamicNavbarHost"></div>

        <div class="container py-4">
            <div class="page-title">Dashboard relationnel Kaggle</div>
            <p class="small-muted">Vue synthétique du catalogue Kaggle relié aux étudiants, au stock local et aux emprunts.</p>

            <div class="row g-4 mb-4" id="dashboardKpis">
                <div class="loading-text">Chargement...</div>
            </div>

            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="table-container">
                        <h4>Livres les plus empruntés</h4>
                        <div id="topBorrowedContainer" class="loading-text">Chargement...</div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="table-container">
                        <h4>Livres les plus populaires globalement</h4>
                        <div id="topPopularContainer" class="loading-text">Chargement...</div>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/api.js"></script>
        <script src="js/dashboard.js"></script>
        <script src="js/auth.js"></script>
<script src="js/protect_app_user.js"></script>    <script src="js/nav_role.js"></script>

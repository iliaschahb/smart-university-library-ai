<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">Smart Library AI</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link " href="index.html">Accueil</a>
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
            <a class="nav-link " href="books.html">Livres</a>
            <a class="nav-link " href="students.html">Étudiants</a>
            <a class="nav-link " href="loans.html">Emprunts</a>
            <a class="nav-link " href="bigdata.html">Big Data</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="page-title">Tableau de bord</div>
    <div class="row g-4 mb-4">
        <div class="col-md-6 col-lg-3"><div class="card card-stat"><div class="card-body"><div class="text-muted">Total livres</div><div class="stat-value" id="totalBooks">0</div></div></div></div>
        <div class="col-md-6 col-lg-3"><div class="card card-stat"><div class="card-body"><div class="text-muted">Total étudiants</div><div class="stat-value" id="totalStudents">0</div></div></div></div>
        <div class="col-md-6 col-lg-3"><div class="card card-stat"><div class="card-body"><div class="text-muted">Total emprunts</div><div class="stat-value" id="totalLoans">0</div></div></div></div>
        <div class="col-md-6 col-lg-3"><div class="card card-stat"><div class="card-body"><div class="text-muted">Livres disponibles</div><div class="stat-value" id="availableBooks">0</div></div></div></div>
    </div>
    <div class="row g-4">
        <div class="col-lg-6"><div class="table-container"><h4>Top livres</h4><div id="topBooksContainer" class="loading-text">Chargement...</div></div></div>
        <div class="col-lg-6"><div class="table-container"><h4>Top catégories</h4><div id="topCategoriesContainer" class="loading-text">Chargement...</div></div></div>
    </div>
    <div class="row g-4 mt-1"><div class="col-lg-12"><div class="table-container"><h4>Informations supplémentaires</h4><p><strong>Retards :</strong> <span id="lateLoansCount">0</span></p><p class="footer-note">Source API : <code>/dashboard/summary</code></p></div></div></div>
</div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

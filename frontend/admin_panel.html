<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panneau Admin - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home_icons.css">
    <link rel="stylesheet" href="css/navbar_dynamic.css">
    <link rel="stylesheet" href="css/ui_final.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/sidebar_dynamic.css">
</head>
<body>
<div id="dynamicNavbarHost"></div>

<div class="container py-4">
    <div class="page-title">Panneau administrateur</div>
    <p class="small-muted">Créer, afficher, désactiver ou supprimer des comptes.</p>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="table-container">
                <h4>Créer un utilisateur</h4>

                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input id="newUsername" class="form-control" placeholder="ex: biblio2">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nom complet</label>
                    <input id="newFullName" class="form-control" placeholder="ex: Bibliothécaire 2">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input id="newPassword" type="password" class="form-control" placeholder="ex: Biblio@123">
                </div>

                <div class="mb-3">
                    <label class="form-label">Rôle</label>
                    <select id="newRole" class="form-select">
                        <option value="librarian">Bibliothécaire</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button class="btn btn-primary w-100" onclick="createUser()">
                    <i class="bi bi-person-plus"></i> Créer
                </button>

                <div id="createUserMessage" class="mt-3 small-muted"></div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="table-container mb-4">
                <h4>État admin</h4>
                <div id="adminHealthContainer" class="loading-text">Chargement...</div>
            </div>

            <div class="table-container">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Utilisateurs</h4>
                    <button class="btn btn-outline-primary btn-sm" onclick="loadAdminUsers()">Actualiser</button>
                </div>

                <div id="adminUsersContainer" class="loading-text">Chargement...</div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/protect_admin.js"></script>
<script src="js/admin_panel.js"></script>
    <script src="js/nav_role.js"></script>
    <script src="js/ui_helpers.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container"><a class="navbar-brand" href="login.html">Smart Library AI</a></div>
    </nav>
    <div class="container py-5" style="max-width: 560px;">
        <div class="table-container shadow-sm">
            <h2 class="mb-3">Connexion administrateur</h2>
            <p class="small-muted">Connecte-toi pour accéder à l’accueil et aux pages de la plateforme.</p>
            <div class="mb-3"><label class="form-label">Nom d'utilisateur</label><input type="text" id="username" class="form-control" value="admin"></div>
            <div class="mb-3"><label class="form-label">Mot de passe</label><input type="password" id="password" class="form-control" value="Admin@123"></div>
            <button class="btn btn-primary w-100" onclick="loginAdmin()">Se connecter</button>
            <div id="authMessage" class="mt-3 small-muted"></div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

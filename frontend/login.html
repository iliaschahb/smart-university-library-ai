<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home_icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="login.html">Smart Library AI</a>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 560px;">
        <div class="table-container shadow-sm">
            <div class="text-center mb-4">
                <div class="login-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h2 class="mb-2">Connexion</h2>
                <p class="small-muted">Admin ou bibliothécaire</p>
            </div>

            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" id="username" class="form-control" value="admin" autocomplete="username">
            </div>

            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" id="password" class="form-control" value="Admin@123" autocomplete="current-password">
            </div>

            <button class="btn btn-primary w-100" onclick="loginUser()">Se connecter</button>

            <div class="mt-3 small-muted">
                <div><strong>Admin :</strong> admin / Admin@123</div>
                <div><strong>Bibliothécaire :</strong> biblio / Biblio@123</div>
            </div>

            <div id="authMessage" class="mt-3 small-muted"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

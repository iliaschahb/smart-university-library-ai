<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livres - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar_dynamic.css">
    <link rel="stylesheet" href="css/ui_final.css">
</head>
<body>
<div id="dynamicNavbarHost"></div>

<div class="container py-4">
    <div class="page-title">Livres</div>
    <p class="small-muted">Consulter le catalogue, vérifier la disponibilité et mettre à jour le stock.</p>

    <div class="row g-3 mb-3">
        <div class="col-md-8">
            <input id="searchInput" class="form-control" placeholder="Rechercher par titre ou auteur...">
        </div>
        <div class="col-md-4">
            <button class="btn btn-primary w-100" onclick="loadBooksActions()">Rechercher</button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="table-container">
                <h4>Catalogue</h4>
                <div id="booksActionsContainer" class="loading-text">Chargement...</div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="table-container">
                <h4>Mettre à jour le stock</h4>
                <div class="mb-3">
                    <label class="form-label">ID livre</label>
                    <input id="stockBookId" type="number" class="form-control" placeholder="ex: 2">
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantité totale</label>
                    <input id="stockQuantity" type="number" class="form-control" placeholder="ex: 5">
                </div>
                <div class="mb-3">
                    <label class="form-label">Emplacement</label>
                    <input id="stockShelf" class="form-control" placeholder="ex: A-12">
                </div>
                <button class="btn btn-primary w-100" onclick="updateStockFromForm()">Mettre à jour</button>
                <hr>
                <button class="btn btn-outline-primary w-100" onclick="predictBookFromForm()">Prévoir la demande</button>
                <div id="stockMessage" class="mt-3 small-muted"></div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav_role.js"></script>
<script src="js/protect_app_user.js"></script>
<script src="js/books_actions.js"></script>
    <script src="js/ui_helpers.js"></script>
</body>
</html>

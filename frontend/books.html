<div class="container py-4">
    <div class="page-title">Gestion des livres</div>
    <div class="row g-4">
        <div class="col-lg-4"><div class="form-card"><h4>Ajouter un livre</h4><form id="bookForm">
            <div class="mb-3"><label class="form-label">Titre</label><input type="text" class="form-control" id="title" required></div>
            <div class="mb-3"><label class="form-label">Auteur</label><input type="text" class="form-control" id="author"></div>
            <div class="mb-3"><label class="form-label">ISBN</label><input type="text" class="form-control" id="isbn"></div>
            <div class="mb-3"><label class="form-label">Catégorie</label><select class="form-select" id="category_id"></select></div>
            <div class="mb-3"><label class="form-label">Année de publication</label><input type="number" class="form-control" id="publication_year"></div>
            <div class="mb-3"><label class="form-label">Quantité</label><input type="number" class="form-control" id="quantity" value="1" min="1"></div>
            <button type="submit" class="btn btn-primary">Ajouter</button>
        </form></div></div>
        <div class="col-lg-8"><div class="table-container"><div class="d-flex justify-content-between align-items-center mb-3"><h4>Liste des livres</h4><button class="btn btn-outline-primary" onclick="loadBooks()">Actualiser</button></div><div id="booksTableContainer" class="loading-text">Chargement...</div></div></div>
    </div>
</div>

    <script src="js/api.js"></script>
    <script src="js/books.js"></script>
</body>

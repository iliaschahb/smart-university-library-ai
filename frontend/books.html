<!DOCTYPE html>
    <html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Livres - Smart Library AI</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/home_icons.css">
    <link rel="stylesheet" href="css/navbar_dynamic.css">
</head>
    <body>
        <div id="dynamicNavbarHost"></div>

        <div class="container py-4">
            <div class="page-title">Livres (catalogue complet)</div>
            <div class="row g-3 mb-3">
                <div class="col-md-8"><input id="searchInput" class="form-control" placeholder="Rechercher par titre ou auteur..."></div>
                <div class="col-md-4"><button class="btn btn-primary w-100" onclick="loadBooks()">Rechercher</button></div>
            </div>
            <div class="table-container">
                <div id="booksContainer" class="loading-text">Chargement...</div>
            </div>
            <div class="table-container mt-4">
                <h4>Détails du livre</h4>
                <div id="bookDetailContainer" class="small-muted">Sélectionnez un livre pour afficher ses détails.</div>
            </div>
        </div>

        <script src="js/api.js"></script>
        <script src="js/books.js"></script>
        <script src="js/auth.js"></script>
<script src="js/protect_app_user.js"></script>    <script src="js/nav_role.js"></script>
</body>
    </html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyses - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home_icons.css">
    <link rel="stylesheet" href="css/navbar_dynamic.css">
    <link rel="stylesheet" href="css/ui_final.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/sidebar_dynamic.css">
</head>
<body>
    <div id="dynamicNavbarHost"></div>

    <div class="container py-4">
        <div class="page-title">Dashboard Analyses - PySpark</div>

        <div class="row g-4 mb-4">
            <div class="col-md-6 col-lg-3"><div class="card card-stat"><div class="card-body"><div class="text-muted">Total livres</div><div class="stat-value" id="totalBooks">0</div></div></div></div>
            <div class="col-md-6 col-lg-3"><div class="card card-stat"><div class="card-body"><div class="text-muted">Total ratings</div><div class="stat-value" id="totalRatings">0</div></div></div></div>
            <div class="col-md-6 col-lg-3"><div class="card card-stat"><div class="card-body"><div class="text-muted">Utilisateurs uniques</div><div class="stat-value" id="totalUsers">0</div></div></div></div>
            <div class="col-md-6 col-lg-3"><div class="card card-stat"><div class="card-body"><div class="text-muted">To Read</div><div class="stat-value" id="totalToRead">0</div></div></div></div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6"><div class="table-container"><h4>Top livres</h4><div id="topBooksContainer" class="loading-text">Chargement...</div></div></div>
            <div class="col-lg-6"><div class="table-container"><h4>Top tags</h4><div id="topTagsContainer" class="loading-text">Chargement...</div></div></div>
            <div class="col-lg-6"><div class="table-container"><h4>Distribution des notes</h4><div id="ratingDistributionContainer" class="loading-text">Chargement...</div></div></div>
            <div class="col-lg-6"><div class="table-container"><h4>Niveaux de popularité</h4><div id="popularityLevelsContainer" class="loading-text">Chargement...</div></div></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/bigdata.js"></script>
    <script src="js/auth.js"></script>
<script src="js/protect_app_user.js"></script>    <script src="js/nav_role.js"></script>
    <script src="js/ui_helpers.js"></script>
</body>
</html>

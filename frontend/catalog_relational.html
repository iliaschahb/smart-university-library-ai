<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue relationnel Kaggle - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home_icons.css">
    <link rel="stylesheet" href="css/navbar_dynamic.css">
    <link rel="stylesheet" href="css/ui_final.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/sidebar_dynamic.css">
</head>
<body>
    <div id="dynamicNavbarHost"></div>

    <div class="container py-4">
        <div class="page-title">Catalogue relationnel basé sur Kaggle</div>
        <p class="small-muted">Les métadonnées des livres viennent de Kaggle, tandis que les étudiants, le stock et les emprunts restent relationnels et locaux.</p>

        <div class="row g-3 mb-4">
            <div class="col-md-8">
                <input id="searchInput" class="form-control" placeholder="Rechercher par titre ou auteur...">
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary w-100" onclick="loadCatalog()">Rechercher</button>
            </div>
        </div>

        <div class="table-container mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Livres enrichis</h4>
                <button class="btn btn-outline-primary" onclick="loadStockAlerts()">Voir alertes de stock</button>
            </div>
            <div id="catalogContainer" class="loading-text">Chargement...</div>
        </div>

        <div class="table-container">
            <h4>Détails / alertes</h4>
            <div id="detailContainer" class="small-muted">Aucune sélection.</div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/catalog_relational.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/protect_admin.js"></script>
    <script src="js/nav_role.js"></script>
    <script src="js/ui_helpers.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emprunts - Smart Library AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar_dynamic.css">
    <link rel="stylesheet" href="css/ui_final.css">
</head>
<body>
<div id="dynamicNavbarHost"></div>

<div class="container py-4">
    <div class="page-title">Gestion des emprunts</div>
    <p class="small-muted">Créer un emprunt, suivre les emprunts et enregistrer les retours.</p>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="table-container">
                <h4>Nouvel emprunt</h4>
                <div class="mb-3">
                    <label class="form-label">ID étudiant</label>
                    <input id="loanStudentId" type="number" class="form-control" placeholder="ex: 1">
                </div>
                <div class="mb-3">
                    <label class="form-label">ID livre</label>
                    <input id="loanBookId" type="number" class="form-control" placeholder="ex: 2">
                </div>
                <div class="mb-3">
                    <label class="form-label">Durée en jours</label>
                    <input id="loanDays" type="number" class="form-control" value="14">
                </div>
                <button class="btn btn-primary w-100" onclick="createLoanFromForm()">Créer l'emprunt</button>
                <div id="createLoanMessage" class="mt-3 small-muted"></div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="table-container">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Liste des emprunts</h4>
                    <button class="btn btn-outline-primary btn-sm" onclick="loadLoansActions()">Actualiser</button>
                </div>
                <div id="loansActionsContainer" class="loading-text">Chargement...</div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav_role.js"></script>
<script src="js/protect_app_user.js"></script>
<script src="js/loans_actions.js"></script>
    <script src="js/ui_helpers.js"></script>
</body>
</html>

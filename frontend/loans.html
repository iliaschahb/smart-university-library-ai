<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">Smart Library AI</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link " href="index.html">Accueil</a>
            <a class="nav-link " href="dashboard.html">Dashboard</a>
            <a class="nav-link " href="books.html">Livres</a>
            <a class="nav-link " href="students.html">Étudiants</a>
            <a class="nav-link active" href="loans.html">Emprunts</a>
            <a class="nav-link " href="bigdata.html">Big Data</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="page-title">Gestion des emprunts</div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="form-card"><h4>Nouvel emprunt</h4><form id="loanForm">
                <div class="mb-3"><label class="form-label">Étudiant</label><select class="form-select" id="student_id"></select></div>
                <div class="mb-3"><label class="form-label">Livre</label><select class="form-select" id="book_id"></select></div>
                <div class="mb-3"><label class="form-label">Date d'emprunt</label><input type="date" class="form-control" id="borrow_date"></div>
                <div class="mb-3"><label class="form-label">Date limite</label><input type="date" class="form-control" id="due_date"></div>
                <button type="submit" class="btn btn-primary">Enregistrer l'emprunt</button>
            </form></div>
            <div class="form-card mt-4"><h4>Emprunts en retard</h4><button class="btn btn-outline-danger mb-3" onclick="loadLateLoans()">Afficher les retards</button><div id="lateLoansContainer"></div></div>
        </div>
        <div class="col-lg-8"><div class="table-container"><div class="d-flex justify-content-between align-items-center mb-3"><h4>Liste des emprunts</h4><button class="btn btn-outline-primary" onclick="loadLoans()">Actualiser</button></div><div id="loansTableContainer" class="loading-text">Chargement...</div></div></div>
    </div>
</div>

    <script src="js/api.js"></script>
    <script src="js/loans.js"></script>
</body>
